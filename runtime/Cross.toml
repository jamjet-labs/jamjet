# Cross-compile config for `cross build`. Used by .github/workflows/release-wheels.yml
# when building aarch64-unknown-linux-gnu binaries.
#
# Without this, the openssl-sys crate fails because the target sysroot doesn't
# have libssl-dev for arm64. We add the foreign architecture and install the
# matching dev package before cargo runs.

[target.aarch64-unknown-linux-gnu]
# Use the cross-rs `:edge` image which has a modern Ubuntu base + OpenSSL >= 1.1.
# Without this, the default cross image ships OpenSSL 1.0.2 which openssl-sys
# 0.9+ explicitly rejects.
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:edge"
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install --assume-yes pkg-config libssl-dev:$CROSS_DEB_ARCH",
]

[target.aarch64-unknown-linux-gnu.env]
PKG_CONFIG_ALLOW_CROSS = "1"
