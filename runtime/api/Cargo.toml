version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "jamjet-server"
path = "src/main.rs"

[dependencies]
jamjet-core = { path = "../core" }
jamjet-ir = { path = "../ir" }
jamjet-state = { path = "../state" }
