jamjet-protocols = { path = "../protocols" }
jamjet-mcp = { path = "../protocols/mcp" }
jamjet-a2a = { path = "../protocols/a2a" }
tokio = { workspace = true }
axum = { workspace = true }
tower-http = { workspace = true }
