image: gitpod/workspace-full

tasks:
  - name: Setup
    init: |
      pip install -e sdk/python[dev]
      cd runtime && cargo build
    command: echo "JamJet dev environment ready. Run 'jamjet --help' to get started."

ports:
  - port: 8080
    onOpen: notify
    name: JamJet Server

vscode:
  extensions:
    - rust-lang.rust-analyzer
    - ms-python.python
