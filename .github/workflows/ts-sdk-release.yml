name: TypeScript SDK Release

on:
  push:
    tags:
      - 'ts-sdk-v*'

jobs:
  publish:
    name: Publish @jamjet/cloud
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: sdk/typescript/pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @jamjet/cloud typecheck

      - name: Build
        run: pnpm --filter @jamjet/cloud build

      - name: Test
        run: pnpm --filter @jamjet/cloud test

      - name: Size check
        run: pnpm --filter @jamjet/cloud size

      - name: Publish to npm with provenance (trusted publisher OIDC)
        # Use npx to fetch a fresh npm >= 11.5.1 (trusted-publisher OIDC support)
        # without overwriting the system npm bundled with Node 22 (which is too old).
        working-directory: sdk/typescript/packages/cloud
        run: npx -y npm@latest publish --access=public --provenance
