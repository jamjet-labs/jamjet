name: Publish Crates

# Publishes all workspace crates to crates.io in dependency order.
# Triggered by version tags (same as release-wheels.yml) or manual dispatch.
#
# Handles crates.io rate limits (429) with retry + backoff.
# Skips crates that are already published (e.g., on re-run after partial failure).
#
# Prerequisites:
#   - CARGO_REGISTRY_TOKEN secret with a crates.io API token
#   - Token must have publish scope for all jamjet-* crates

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
          key: cargo-registry-${{ hashFiles('runtime/Cargo.lock') }}

      - name: Publish all crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          publish() {
            local crate=$1
            local max_retries=3
            local retry=0
            while [ $retry -lt $max_retries ]; do
              echo "Publishing $crate (attempt $((retry+1))/$max_retries)..."
              if cargo publish -p "$crate" --no-verify 2>&1 | tee /tmp/publish.log; then
                echo "✅ $crate published successfully"
                return 0
              fi
              if grep -q "already uploaded" /tmp/publish.log; then
                echo "⏭️  $crate already published, skipping"
                return 0
              fi
              if grep -q "429" /tmp/publish.log; then
                retry=$((retry+1))
                echo "⏳ Rate limited, waiting 120s before retry..."
                sleep 120
              else
                echo "❌ $crate failed with non-retryable error"
                cat /tmp/publish.log
                return 1
              fi
            done
            echo "❌ $crate failed after $max_retries retries"
            return 1
          }

          # Tier 0 — no internal deps
          publish jamjet-core
          publish jamjet-telemetry
          publish jamjet-protocols
          echo "Waiting 60s for index propagation..."
          sleep 60

          # Tier 1
          publish jamjet-ir
          publish jamjet-models
          echo "Waiting 60s for index propagation..."
          sleep 60

          # Tier 2
          publish jamjet-state
          publish jamjet-agents
          publish jamjet-timers
          publish jamjet-mcp
          echo "Waiting 60s for index propagation..."
          sleep 60

          # Tier 3
          publish jamjet-scheduler
          publish jamjet-policy
          publish jamjet-audit
          echo "Waiting 60s for index propagation..."
          sleep 60

          # Tier 4
          publish jamjet-a2a-proto
          publish jamjet-worker
          publish jamjet-api

          echo "🎉 All crates published!"
