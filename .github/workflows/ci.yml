name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust ────────────────────────────────────────────────────────────
  rust-lint:
    name: Rust lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime -> target
      - name: Create web/dist placeholder for rust-embed
        run: mkdir -p ../web/dist && echo '<!DOCTYPE html><html><body></body></html>' > ../web/dist/index.html
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-features -- -D warnings

  rust-test:
    name: Rust tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime -> target
      - name: Create web/dist placeholder for rust-embed
        run: mkdir -p ../web/dist && echo '<!DOCTYPE html><html><body></body></html>' > ../web/dist/index.html
      - name: Test
        run: cargo test --workspace

  # ── Python SDK ──────────────────────────────────────────────────────
  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install uv
      - run: uv sync --all-extras
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy jamjet

  python-test:
    name: Python tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install uv
      - run: uv sync --all-extras
      - run: uv run pytest --tb=short

  # ── Java SDK ────────────────────────────────────────────────────────
  java-test:
    name: Java SDK tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - name: Build and test
        run: mvn test -q --no-transfer-progress

  # ── Security audit ──────────────────────────────────────────────────
  rust-audit:
    name: Rust dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime -> target
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        run: |
          # --deny unsound: fail on CVEs/unsound advisories (not on unmaintained warnings)
          # --ignore RUSTSEC-2023-0071: rsa Marvin Attack — no upstream fix available yet;
          #   we use rsa only as a transitive dep of tonic, not for key operations.
          cargo audit --deny unsound \
            --ignore RUSTSEC-2023-0071

  python-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install uv pip-audit
      - run: uv sync --all-extras
      - name: Audit dependencies
        run: pip-audit --desc

  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before != '0000000000000000000000000000000000000000' && github.event.before || github.sha }}
          head: HEAD
          extra_args: --only-verified

  # ── Build check ─────────────────────────────────────────────────────
  build:
    name: Build release binary
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime -> target
      - name: Create web/dist placeholder for rust-embed
        run: mkdir -p ../web/dist && echo '<!DOCTYPE html><html><body></body></html>' > ../web/dist/index.html
      - run: cargo build --release --workspace

  # ── Wheel build check ───────────────────────────────────────────────
  wheel-check:
    name: Wheel build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build
        run: pip install build
      - name: Build wheel
        run: python -m build --wheel
        working-directory: sdk/python
      - name: Smoke-test wheel installs
        run: |
          pip install sdk/python/dist/*.whl
          jamjet --help
