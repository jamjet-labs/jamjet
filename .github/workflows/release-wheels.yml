name: Release

# Builds and publishes the jamjet Python wheel and platform-specific
# jamjet-server binaries on version tags (v*.*.*) or manual dispatch.
#
# Distribution model:
#   - jamjet wheel  →  pure Python, published to PyPI via Trusted Publishing
#   - jamjet-server →  Rust binary per platform, uploaded to the GitHub Release
#
# On first `jamjet dev`, the CLI auto-downloads the correct binary from the
# GitHub Release via _find_server_binary() → _download_server_binary().

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write   # to upload binaries to the GitHub Release

jobs:
  # ── Python wheel (pure Python, one build) ──────────────────────────────────
  build-wheel:
    name: Build Python wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build wheel + sdist
        run: python -m build
        working-directory: sdk/python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: sdk/python/dist/

  # ── Rust binaries (cross-platform matrix) ──────────────────────────────────
  build-binary:
    name: Build binary — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: jamjet-server-linux-x86_64
          # aarch64-linux temporarily disabled: rust-embed expects ../../web/dist
          # which lives outside the cross-rs container mount. Fix tracked
          # separately (either copy web/ into runtime/ before cross, or
          # mount-volumes via a custom cross image). Re-enable after.
          # - os: ubuntu-latest
          #   target: aarch64-unknown-linux-gnu
          #   artifact: jamjet-server-linux-aarch64
          #   cross: true
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: jamjet-server-darwin-aarch64
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: jamjet-server-darwin-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: jamjet-server-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: runtime -> target
          key: ${{ matrix.target }}

      - name: Create web/dist placeholder for rust-embed
        run: mkdir -p web/dist && echo '<!DOCTYPE html><html><body></body></html>' > web/dist/index.html

      - name: Install cross (Linux aarch64)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build binary (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p jamjet-api
        working-directory: runtime

      - name: Build binary (cross)
        if: ${{ matrix.cross }}
        run: cross build --release --target ${{ matrix.target }} -p jamjet-api
        working-directory: runtime

      - name: Stage binary (Unix)
        if: runner.os != 'Windows'
        run: cp runtime/target/${{ matrix.target }}/release/jamjet-server ${{ matrix.artifact }}

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        run: cp runtime/target/${{ matrix.target }}/release/jamjet-server.exe ${{ matrix.artifact }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Publish wheel to PyPI + binaries to GitHub Release ─────────────────────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [build-wheel, build-binary]
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      contents: write
      id-token: write   # for PyPI Trusted Publishing (OIDC)

    steps:
      - name: Download Python dist
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist/

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: binaries/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*
          fail_on_unmatched_files: true
