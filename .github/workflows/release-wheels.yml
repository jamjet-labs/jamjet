name: Release Wheels

# Builds platform-specific Python wheels that include the jamjet-server binary.
# Triggered on version tags (v*.*.*) or manually.
#
# Produces wheels for:
#   macOS  arm64  (Apple Silicon)
#   macOS  x86_64 (Intel)
#   Linux  x86_64 (manylinux2014)
#   Linux  aarch64
#   Windows x86_64
#
# After `pip install jamjet` from one of these wheels, `jamjet-server` is
# available in PATH — zero Rust install required (task 3.28).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheel — ${{ matrix.platform.os }} ${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: macos-14          # Apple Silicon runner
            target: aarch64
          - os: macos-13          # Intel runner
            target: x86_64
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64       # cross-compiled
          - os: windows-latest
            target: x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheels (maturin)
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: >
            --release
            --out dist
            --manifest-path runtime/api/Cargo.toml
            --interpreter python3.11
          target: ${{ matrix.platform.target }}
          manylinux: auto        # uses manylinux2014 on Linux for broad compat
          working-directory: sdk/python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: sdk/python/dist/*.whl

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels]
    # Only publish on tag push (not manual dispatch without a tag)
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write   # for trusted publishing (OIDC)

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
