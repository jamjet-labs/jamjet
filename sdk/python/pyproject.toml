[build-system]
# maturin bundles the jamjet-server Rust binary into the wheel (task 3.28).
# The binary is placed in PATH on `pip install`, so `jamjet dev` works with
# zero Rust toolchain required on the user's machine.
#
# Local development (no binary bundling):
#   pip install -e ".[dev]"
#
# Wheel with bundled binary (CI / release):
#   maturin build --release -m ../../runtime/api/Cargo.toml
#   pip install dist/jamjet-*.whl
requires = ["maturin>=1.5,<2.0"]
build-backend = "maturin"

[project]
name = "jamjet"
version = "0.1.0"
description = "JamJet Python SDK — agent-native workflow authoring and CLI"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.27",
    "typer>=0.12",
    "rich>=13.0",
    "anyio>=4.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.4",
    "mypy>=1.10",
]

[project.scripts]
jamjet = "jamjet.cli.main:app"

# ── Maturin configuration (task 3.28) ─────────────────────────────────────────
# bindings = "bin"  →  bundle a Rust binary (not a Python extension module)
# manifest-path     →  the Cargo.toml of the crate that contains [[bin]] jamjet-server
# python-source     →  where the Python package lives (relative to this pyproject.toml)
#
# After `maturin build --release`, the wheel contains:
#   scripts/jamjet-server       (auto-added to PATH by pip)
#   jamjet/                     (the Python package)
#
# The CLI's _find_server_binary() checks shutil.which("jamjet-server") first,
# so the bundled binary is picked up automatically — no extra code needed.
[tool.maturin]
bindings = "bin"
manifest-path = "../../runtime/api/Cargo.toml"
python-source = "."

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "N", "ANN"]
ignore = ["ANN401"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
